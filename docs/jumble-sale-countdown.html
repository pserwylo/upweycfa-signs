<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jumble Sale Countdown</title>
    <link rel="stylesheet" href="./sign.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Slackey&family=Special+Elite&display=swap" rel="stylesheet">
    <script src="https://moment.github.io/luxon/global/luxon.min.js"></script>

    <style>
        h1 {
            text-align: center;
        }

        p {
            margin: 0;
        }

        .items-list {
            font-size: 1em;
            text-align: left;
            list-style: none;
            margin: 0.5em 0 0 0;
            padding: 0;
            overflow-y: hidden;
            height: 100%;
        }

        .items-list li {
            white-space: nowrap;
            display: inline-block;
        }
    </style>
</head>
<body class="sign">

</body>
<script src="sign.js"></script>
<script>
    (function() {
        const sign = document.querySelector('.sign');
        let state = null;

        const updateTime = function() {

            try {
                const date = dateParam();
                const debug = date.debug;
                if (date == null) {
                    sign.innerText = "Specify a ?date=YYYY-MM-DD HH:mm:ss param";
                    return;
                }

                if (date.diff.seconds <= 0) {
                    if (state !== "started") {
                        state = "started";
                        started(debug);
                    }
                } else if (date.diff.seconds <= 60) {
                    underAMinute(date.diff.seconds, debug);
                } else if (date.diff.minutes < 60) {
                    underAnHour(date.diff.seconds, debug);
                } else if (date.diff.hours < 24) {
                    const targetState = `hours-${date.diff.hours}`;
                    if (state !== targetState) {
                        state = targetState;
                        underADay(date.diff.hours, debug);
                    }
                } else {
                    const targetState = `days-${date.diff.days}`;
                    if (state !== targetState) {
                        state = targetState;
                        overADay(date.diff.days, debug);
                    }
                }
            } catch (e) {
                console.error("Error updating screen: " + e);
            }
        };

        setInterval(function() {
            updateTime();
        }, 1000);

        updateTime();

        function started(debug) {
            sign.innerHTML = `
                <cfa-banner>
                    <h1>
                        Welcome to the<br />Jumble Sale!
                    </h1>
                    <div slot="right">
                        <h1 style="font-size: 8em;">🎉</h1>
                    </div>
                </cfa-banner>
            `
        }

        function underAMinute(seconds, debug) {
            const secs = seconds % 60;
            const secondsClock = secs < 10 ? `0${secs}` : secs;
            sign.innerHTML = `
                <cfa-banner>
                    <h1 style="font-size: 8em">00:${secondsClock}</h1>
                    <div slot="right">
                        <h1 style="font-size: 6em;">⏰</h1>
                    </div>
                </cfa-banner>
            `
        }

        function underAnHour(seconds, debug) {
            const secs = seconds % 60;
            const secondsClock = secs < 10 ? `0${secs}` : secs;

            const minutes = Math.round(seconds / 60)
            const mins = minutes % 60;
            const minutesClock = mins < 10 ? `0${mins}` : mins;

            sign.innerHTML = `
                <cfa-banner>
                    <p style="font-size: 2em">Jumble Sale starts in</p>
                    <p style="font-size: 4em">${minutesClock}:${secondsClock}</p>
                    <div slot="right">
                        <h1 style="font-size: 6em;">⏰</h1>
                    </div>
                </cfa-banner>
            `
        }

        function underADay(hours, debug) {
            const title = hours === 1 ? "1 Hour" : `${hours} Hours`

            sign.innerHTML = `
                <style>
                    .time-left {
                        font-size: 4em;
                        text-align: center;
                    }

                    .time-left--text {
                        font-size: 2.5em;
                        text-align: center;
                        white-space: nowrap;
                    }
                </style>
                <cfa-banner>
                    <p class="time-left">${title}</p>
                    <p class="time-left--text">to Jumble Sale!</p>
                    <div slot="right" style="font-size: 2em; color: black; font-family: Arial, Helvetica, sans-serif; height: 100%; display: flex; flex-direction: column; justify-content: center;">
                        <h1 style="font-size: 1.2em; margin: 0">Saturday, May 2nd<br />9am - 2pm</h1>
                        <!--<ul class="items-list"">
                            <li>🪑</li>
                            <li>🔨</li>
                            <li>⛺</li>
                            <li>🍴</li>
                            <li>📻</li>
                            <li>📚</li>
                            <li>🌭</li>
                            <li>💿</li>
                        </ul>-->
                    </div>
                </cfa-banner>
            `
        }

        function overADay(days, debug) {
            const title = days === 1 ? "1 Day" : `${days} Days`

            sign.innerHTML = `
                <style>
                    .time-left {
                        font-size: 4em;
                        text-align: center;
                    }

                    .time-left--text {
                        font-size: 2.5em;
                        text-align: center;
                        white-space: nowrap;
                    }
                </style>
                <cfa-banner>
                    <p class="time-left">${title}</p>
                    <p class="time-left--text">to Jumble Sale!</p>
                    <div slot="right" style="font-size: 2em; color: black; font-family: Arial, Helvetica, sans-serif; height: 100%; display: flex; flex-direction: column; justify-content: center;">
                        <h1 style="font-size: 1.2em; margin: 0">Saturday<br />May 2nd<br />9am - 2pm</h1>
                        <!--<ul class="items-list"">
                            <li>🪑</li>
                            <li>🔨</li>
                            <li>⛺</li>
                            <li>🍴</li>
                            <li>📻</li>
                            <li>📚</li>
                            <li>🌭</li>
                            <li>💿</li>
                        </ul>-->
                    </div>
                </cfa-banner>
            `
        }
    })();
</script>
</html>
