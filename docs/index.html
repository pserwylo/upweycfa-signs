<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upwey CFA Signs</title>
    <style>
        iframe {
            zoom: 0.5;
        }

        h1, h2, h3 {
            margin: 0.5em 0 0 0;
        }

        p {
            margin: 0;
        }
    </style>
    <script src="https://moment.github.io/luxon/global/luxon.min.js"></script>
</head>
<body>
    <h2>Videos for throughout day</h2>
    <div id="videos">
        <video src="./videos/delivery.mp4" controls width="320"></video>
        <video src="./videos/firewood.mp4" controls width="320"></video>
        <video src="./videos/bus-stop.mp4" controls width="320"></video>
        <video src="./videos/hungry.mp4" controls width="320"></video>
        <video src="./videos/thank-you.mp4" controls width="320"></video>
        <video src="./videos/books.mp4" controls width="320"></video>
        <video src="./videos/technology.mp4" controls width="320"></video>
    </div>

    <h2>Countdown to Jumble Sale</h2>
    <p>For days leading up to the sale, and the final seconds before the rope lifts.</p>
    <div id="countdown"></div>
</body>
<script>
    (function() {
        const date = new Date("2026-05-02 09:00:00");

        const started = new Date("2026-05-02 09:01:30");
        const startedUrl = `./jumble-sale-countdown.html?date=${date.toISOString()}&now=${started.toISOString()}`;

        const twentySeconds = new Date("2026-05-02 08:59:40")
        const twentySecondsUrl = `./jumble-sale-countdown.html?date=${date.toISOString()}&now=${twentySeconds.toISOString()}`;

        const tenMinutes = new Date("2026-05-02 08:50:00")
        const tenMinutesUrl = `./jumble-sale-countdown.html?date=${date.toISOString()}&now=${tenMinutes.toISOString()}`;

        const twoHours = new Date("2026-05-02 06:30:00")
        const twoHoursUrl = `./jumble-sale-countdown.html?date=${date.toISOString()}&now=${twoHours.toISOString()}`;

        const twoDays = new Date("2026-04-30 22:00:00")
        const twoDaysUrl = `./jumble-sale-countdown.html?date=${date.toISOString()}&now=${twoDays.toISOString()}`;

        const node = document.createElement('div');
        node.innerHTML = innerHTML = `
            <h3>Started</h3>
            <p>Shown after the 9am start time (i.e. when countdown completes)</p>
            <iframe style="width: 640px; height: 240px" src="${startedUrl}" style="zoom: 0.5"></iframe>

            <h3>Under a minute</h3>
            <p>For a big countdown just before the rope lifts.</p>
            <iframe style="width: 640px; height: 240px" src="${twentySecondsUrl}"></iframe>

            <h3>Under an hour</h3>
            <p>Countdown doesn't need to be so big. Will use the right side to show what is for sale.</p>
            <iframe style="width: 640px; height: 240px" src="${tenMinutesUrl}"></iframe>

            <h3>${twoHours.toLocaleString()}</h3>
            <iframe style="width: 640px; height: 240px" src="${twoHoursUrl}"></iframe>

            <h3>${twoDays.toLocaleString()}</h3>
            <iframe style="width: 640px; height: 240px" src="${twoDaysUrl}"></iframe>
        `;

        document.querySelector('body').appendChild(node);
    })();
</script>
</html>
