<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upwey CFA Signs</title>
    <style>
        iframe {
            zoom: 0.5;
        }

        h1, h2, h3 {
            margin: 0.5em 0 0 0;
        }

        p {
            margin: 0;
        }
    </style>
</head>
<body>
    <h2>Videos for throughout day</h2>
    <div id="videos">
        <video src="./videos/thank-you.mp4" controls width="320"></video>
        <video src="./videos/technology.mp4" controls width="320"></video>
        <video src="./videos/firewood.mp4" controls width="320"></video>
        <video src="./videos/delivery.mp4" controls width="320"></video>
    </div>

    <h2>Countdown to Jumble Sale</h2>
    <p>For days leading up to the sale, and the final seconds before the rope lifts.</p>
    <div id="countdown"></div>
</body>
<script>
    (function() {
        const list = document.getElementById('file-list');

        const now = new Date();

        const started = new Date()
        started.setTime(now.getTime() - 1000);
        const startedUrl = `./jumble-sale-countdown.html?date=${started.toISOString()}`;

        const tenSeconds = new Date()
        tenSeconds.setTime(now.getTime() + 1000 * 10);
        const tenSecondsUrl = `./jumble-sale-countdown.html?date=${tenSeconds.toISOString()}`;

        const twentySeconds = new Date()
        twentySeconds.setTime(now.getTime() + 1000 * 20);
        const twentySecondsUrl = `./jumble-sale-countdown.html?date=${twentySeconds.toISOString()}`;

        const tenMinutes = new Date()
        tenMinutes.setTime(now.getTime() + 1000 * 60 * 15);
        const tenMinutesUrl = `./jumble-sale-countdown.html?date=${tenMinutes.toISOString()}`;

        const oneHour = new Date()
        oneHour.setTime(now.getTime() + 1000 * 60 * 60);
        const oneHourUrl = `./jumble-sale-countdown.html?date=${oneHour.toISOString()}`;

        const twoHours = new Date()
        twoHours.setTime(now.getTime() + 1000 * 60 * 60 * 2);
        const twoHoursUrl = `./jumble-sale-countdown.html?date=${twoHours.toISOString()}`;

        const oneDay = new Date()
        oneDay.setTime(now.getTime() + 1000 * 60 * 60 * 24);
        const oneDayUrl = `./jumble-sale-countdown.html?date=${oneDay.toISOString()}`;

        const twoDays = new Date()
        twoDays.setTime(now.getTime() + 1000 * 60 * 60 * 24 * 2);
        const twoDaysUrl = `./jumble-sale-countdown.html?date=${twoDays.toISOString()}`;

        const node = document.createElement('div');
        node.innerHTML = innerHTML = `
            <h3>Started</h3>
            <p>Shown after the 9am start time (i.e. when countdown completes)</p>
            <iframe style="width: 640px; height: 240px" src="${startedUrl}" style="zoom: 0.5"></iframe>

            <h3>Under a minute</h3>
            <p>For a big countdown just before the rope lifts.</p>
            <iframe style="width: 640px; height: 240px" src="${twentySecondsUrl}"></iframe>

            <h3>Under an hour</h3>
            <p>Countdown doesn't need to be so big. Will use the right side to show what is for sale.</p>
            <iframe style="width: 640px; height: 240px" src="${tenMinutesUrl}"></iframe>

            <h3>Two Hours</h3>
            <iframe style="width: 640px; height: 240px" src="${twoHoursUrl}"></iframe>

            <h3>Two Days</h3>
            <iframe style="width: 640px; height: 240px" src="${twoDaysUrl}"></iframe>
        `;

        document.querySelector('body').appendChild(node);
    })();
</script>
</html>
